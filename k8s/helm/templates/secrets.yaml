apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: triage
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | default "CHANGEME" | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | default "CHANGEME" | quote }}
  LINEAR_API_KEY: {{ .Values.secrets.linearApiKey | default "CHANGEME" | quote }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | default "CHANGEME" | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | default "CHANGEME" | quote }}
  SALT: {{ .Values.secrets.salt | default "CHANGEME" | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | default "CHANGEME" | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | default "CHANGEME" | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | default "CHANGEME" | quote }}
  REDIS_AUTH: {{ .Values.secrets.redisAuth | default "CHANGEME" | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | default "CHANGEME" | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: {{ .Values.secrets.langfuseS3EventUploadSecretAccessKey | default "CHANGEME" | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: {{ .Values.secrets.langfuseS3MediaUploadSecretAccessKey | default "CHANGEME" | quote }}
  LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: {{ .Values.secrets.langfuseS3BatchExportSecretAccessKey | default "CHANGEME" | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default "CHANGEME" | quote }}
  LANGFUSE_INIT_USER_PASSWORD: {{ .Values.secrets.langfuseInitUserPassword | default "CHANGEME" | quote }}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: {{ .Values.secrets.langfuseInitProjectSecretKey | default "CHANGEME" | quote }}
