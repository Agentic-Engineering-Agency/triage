apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: triage
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ required "secrets.betterAuthSecret is required" .Values.secrets.betterAuthSecret | quote }}
  OPENROUTER_API_KEY: {{ required "secrets.openrouterApiKey is required" .Values.secrets.openrouterApiKey | quote }}
  LINEAR_API_KEY: {{ .Values.secrets.linearApiKey | default "" | quote }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | default "" | quote }}
  ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required" .Values.secrets.encryptionKey | quote }}
  SALT: {{ required "secrets.salt is required" .Values.secrets.salt | quote }}
  NEXTAUTH_SECRET: {{ required "secrets.nextauthSecret is required" .Values.secrets.nextauthSecret | quote }}
  LANGFUSE_SECRET_KEY: {{ required "secrets.langfuseSecretKey is required" .Values.secrets.langfuseSecretKey | quote }}
  CLICKHOUSE_PASSWORD: {{ required "secrets.clickhousePassword is required" .Values.secrets.clickhousePassword | quote }}
  REDIS_AUTH: {{ required "secrets.redisAuth is required" .Values.secrets.redisAuth | quote }}
  MINIO_ROOT_PASSWORD: {{ required "secrets.minioRootPassword is required" .Values.secrets.minioRootPassword | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: {{ required "secrets.langfuseS3EventUploadSecretAccessKey is required" .Values.secrets.langfuseS3EventUploadSecretAccessKey | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: {{ required "secrets.langfuseS3MediaUploadSecretAccessKey is required" .Values.secrets.langfuseS3MediaUploadSecretAccessKey | quote }}
  LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: {{ required "secrets.langfuseS3BatchExportSecretAccessKey is required" .Values.secrets.langfuseS3BatchExportSecretAccessKey | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  LANGFUSE_INIT_USER_PASSWORD: {{ required "secrets.langfuseInitUserPassword is required" .Values.secrets.langfuseInitUserPassword | quote }}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: {{ required "secrets.langfuseInitProjectSecretKey is required" .Values.secrets.langfuseInitProjectSecretKey | quote }}
