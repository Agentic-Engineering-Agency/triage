frontend:
  replicaCount: 1
  image:
    repository: triage-frontend
    tag: latest
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5

runtime:
  replicaCount: 1
  image:
    repository: triage-runtime
    tag: latest
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5

langfuseWeb:
  replicaCount: 1
  image:
    repository: langfuse/langfuse
    tag: "3"
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

langfuseWorker:
  replicaCount: 1
  image:
    repository: langfuse/langfuse-worker
    tag: "3"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

libsql:
  replicaCount: 1
  image:
    repository: ghcr.io/tursodatabase/libsql-server
    tag: latest
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: triage.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: runtime
        - path: /langfuse
          pathType: Prefix
          service: langfuse-web

# Bitnami subchart overrides
postgresql:
  enabled: true
clickhouse:
  enabled: true
redis:
  enabled: true
minio:
  enabled: true
