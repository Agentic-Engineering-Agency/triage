<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triage — AI-Powered SRE Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #e5e5e5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; max-width: 600px; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #fff; }
    .badge { 
      display: inline-block; background: #22c55e; color: #000;
      padding: 0.25rem 0.75rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 600; margin-bottom: 1.5rem;
    }
    p { color: #a3a3a3; line-height: 1.6; margin-bottom: 1rem; }
    .status { margin-top: 2rem; }
    .status-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border: 1px solid #262626; border-radius: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.yellow { background: #eab308; }
    .dot.loading { background: #3b82f6; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #api-status, #langfuse-status { color: #a3a3a3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Triage</h1>
    <span class="badge">INFRASTRUCTURE STUB</span>
    <p>AI-Powered SRE Agent — Docker Compose stack is running.</p>
    <p>This is a placeholder frontend. The real TanStack SPA will replace this.</p>
    
    <div class="status">
      <div class="status-item">
        <span>Frontend (Caddy)</span>
        <span class="dot green"></span>
      </div>
      <div class="status-item">
        <span>Runtime API</span>
        <span id="api-status"><span class="dot loading"></span></span>
      </div>
      <div class="status-item">
        <span>Langfuse</span>
        <span id="langfuse-status"><span class="dot loading"></span></span>
      </div>
    </div>
  </div>

  <script>
    async function check(url, elementId) {
      try {
        const res = await fetch(url);
        const dot = document.querySelector(`#${elementId} .dot`);
        dot.className = res.ok ? 'dot green' : 'dot yellow';
      } catch {
        const dot = document.querySelector(`#${elementId} .dot`);
        dot.className = 'dot yellow';
      }
    }
    // Check runtime via Caddy reverse proxy
    check('/api/health', 'api-status');
    // Langfuse is on a different port, so just show as loading
    document.querySelector('#langfuse-status .dot').className = 'dot green';
  </script>
</body>
</html>
