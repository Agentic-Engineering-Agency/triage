# Dev mode override — auto-loaded by `docker compose up`
# REQUIRES: ./frontend/ and ./runtime/ directories with real package.json
# files for Vite HMR and tsx watch to work. Stubs won't support dev mode.
# To run in production mode only: docker compose -f docker-compose.yml up

services:
  vite:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - vite_node_modules:/app/node_modules
    networks:
      - app

  frontend:
    environment:
      FRONTEND_MODE: dev

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: builder
    working_dir: /app/runtime
    command: sh -c "node /app/runtime/init-db.mjs && npx mastra dev"
    environment:
      - PORT=4111
      - LIBSQL_URL=http://libsql:8080
      - NODE_ENV=development
    volumes:
      - ./runtime/src:/app/runtime/src
      - ./runtime/init-db.mjs:/app/runtime/init-db.mjs

volumes:
  vite_node_modules:
