services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      runtime:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - app
    volumes:
      - ./config.json:/srv/config.json:ro

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    ports:
      - "127.0.0.1:4111:4111"
    depends_on:
      libsql:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4111/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always
    networks:
      - app

  libsql:
    image: ghcr.io/tursodatabase/libsql-server:v0.24.32
    platform: linux/amd64
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:5001:5001"
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: 0.0.0.0:8080
      SQLD_GRPC_LISTEN_ADDR: 0.0.0.0:5001
    volumes:
      - /var/lib/sqld
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - app

networks:
  app:
    driver: bridge
